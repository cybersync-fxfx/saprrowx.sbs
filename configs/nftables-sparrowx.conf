#!/usr/sbin/nft -f

# =================================================================
#  SPARROWX — Advanced nftables Ruleset
#  Layer 2 — Kernel-level Filtering & Rate Limiting
# =================================================================

flush ruleset

table inet sparrowx_shield {
    # Dynamic sets for tracking bad actors
    set blacklist {
        type ipv4_addr
        flags dynamic, timeout
        timeout 1h
        comment "Persistent IP blocklist"
    }

    set connection_tracking {
        type ipv4_addr
        flags dynamic, timeout
        timeout 1m
        size 65535
    }

    set port_scanners {
        type ipv4_addr
        flags dynamic, timeout
        timeout 10m
        comment "IPs caught scanning ports"
    }

    # Flow tables for fast tracking
    flowtable f1 {
        hook ingress priority 0
        devices = { IFACE_PLACEHOLDER }
    }

    chain input {
        type filter hook input priority filter; policy accept;

        # 1. Allow Loopback & Established
        iif "lo" accept
        ct state established,related accept
        ct state invalid drop

        # 2. Block Blacklisted IPs
        ip saddr @blacklist drop

        # 3. ICMP rate limiting (Ping Flood Protection)
        ip protocol icmp icmp type echo-request limit rate 5/second burst 10 packets accept
        ip protocol icmp icmp type echo-request drop

        # 4. Port Scan Detection
        # Detects more than 10 new connections to different ports in 1 minute
        tcp flags syn tcp dport != { 22, 80, 443, 3001 } add @port_scanners { ip saddr }
        ip saddr @port_scanners drop

        # 5. SYN Flood Protection (Advanced Metering)
        # Limits new TCP connections per source IP to 20/sec
        tcp flags syn meter syn_limit { ip saddr limit rate 20/second burst 40 packets } accept
        tcp flags syn add @blacklist { ip saddr } log prefix "[SPARROWX-SYN-BAN] " drop

        # 6. UDP Flood Protection
        # Limits UDP packets per source IP to 100/sec
        ip protocol udp meter udp_limit { ip saddr limit rate 100/second burst 200 packets } accept
        ip protocol udp add @blacklist { ip saddr } log prefix "[SPARROWX-UDP-BAN] " drop

        # 7. Protect SSH & Panel
        tcp dport 22 accept
        tcp dport 80 accept
        tcp dport 443 accept
        tcp dport 3001 accept

        # 8. Drop Everything Else (Optional - Default is accept for safety during setup)
        # Uncomment the line below once setup is verified
        # type filter hook input priority filter; policy drop;
    }

    chain forward {
        type filter hook forward priority filter; policy accept;
        # Fast path for established traffic
        ip protocol tcp flow add @f1
    }
}
