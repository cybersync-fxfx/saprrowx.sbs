###
### FastNetMon configuration
###

# Main settings
daemon = on

# Logging
logging:local:syslog = on
logging:local:file = on
logging:file:path = /var/log/fastnetmon.log

# Attack detection settings
threshold_pps = 20000
threshold_mbps = 200
threshold_flows = 3000

# Ban time in seconds
ban_time = 1800

# Action script to run when attack detected
notify_script_path = /usr/local/bin/fastnetmon-notify.sh

# Capture engine
mirror = off
method = af_packet

# Interfaces to listen on
interfaces = IFACE_PLACEHOLDER

# Advanced settings
enable_per_ip_stats = on
collect_all_stats = off
