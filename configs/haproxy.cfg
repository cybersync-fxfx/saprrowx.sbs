global
    log /dev/log local0
    log /dev/log local1 notice
    chroot /var/lib/haproxy
    stats socket /run/haproxy/admin.sock mode 660 level admin expose-fd listeners
    stats timeout 30s
    user haproxy
    group haproxy
    daemon

    # SSL hardening
    ssl-default-bind-ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384
    ssl-default-bind-options no-sslv3 no-tlsv10 no-tlsv11 no-tls-tickets

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    timeout connect 5000
    timeout client  50000
    timeout server  50000
    errorfile 400 /etc/haproxy/errors/400.http
    errorfile 403 /etc/haproxy/errors/403.http
    errorfile 408 /etc/haproxy/errors/408.http
    errorfile 500 /etc/haproxy/errors/500.http
    errorfile 502 /etc/haproxy/errors/502.http
    errorfile 503 /etc/haproxy/errors/503.http
    errorfile 504 /etc/haproxy/errors/504.http

# ── Frontends ──────────────────────────────────────────────────

frontend sparrowx_http
    bind *:80
    # Redirect to HTTPS if SSL is enabled (placeholder logic for setup script)
    # redirect scheme https code 301 if !{ ssl_fc }
    default_backend sparrowx_panel

frontend sparrowx_https
    # bind *:443 ssl crt /etc/ssl/sparrowx/cert.pem
    mode http
    option forwardfor

    # Rate limiting table
    stick-table type ip size 100k expire 30s store http_req_rate(10s)
    
    # 1. Block known bad bots (User-Agent check)
    acl bad_bots hdr_sub(user-agent) -i sqlmap nikto masscan zgrab nuclei netsparker python-requests
    http-request deny if bad_bots

    # 2. Rate limit: Max 100 requests per 10 seconds per IP
    http-request track-sc0 src
    http-request deny deny_status 429 if { sc_http_req_rate(0) gt 100 }

    # 3. Block suspicious URL patterns (SQLi, XSS)
    acl suspicious_url path_reg -i (\%27|\%22|\*|union|select|insert|update|delete|drop|alert|script)
    http-request deny if suspicious_url

    default_backend sparrowx_panel

# ── Backends ───────────────────────────────────────────────────

backend sparrowx_panel
    balance roundrobin
    option httpchk GET /api/health
    server panel_local 127.0.0.1:PANEL_PORT_PLACEHOLDER check inter 2000 fall 3 rise 2
