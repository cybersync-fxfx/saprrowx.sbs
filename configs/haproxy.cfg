global
    log /dev/log local0
    log /dev/log local1 notice
    chroot /var/lib/haproxy
    stats socket /run/haproxy/admin.sock mode 660 level admin expose-fd listeners
    stats timeout 30s
    user haproxy
    group haproxy
    daemon
    maxconn 50000

    # Modern SSL configuration
    ssl-default-bind-ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384
    ssl-default-bind-options no-sslv3 no-tlsv10 no-tlsv11 no-tls-tickets

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    timeout connect 5s
    timeout client  50s
    timeout server  50s

# ── Frontends ──────────────────────────────────────────────────

frontend sparrowx_front
    HTTP_BIND_PLACEHOLDER
    HTTPS_BIND_PLACEHOLDER
    
    # Track request rates
    stick-table type ip size 100k expire 30s store http_req_rate(10s)
    http-request track-sc0 src
    
    # 1. Block known bad bots
    acl bad_bots hdr_sub(user-agent) -i sqlmap nikto masscan zgrab nuclei netsparker
    http-request deny if bad_bots

    # 2. Rate limit: Max 100 requests per 10 seconds
    http-request deny deny_status 429 if { sc_http_req_rate(0) gt 100 }

    # 3. Block suspicious URL patterns
    acl suspicious_url path_reg -i (\%27|\%22|\*|union|select|insert|update|delete|drop|alert|script)
    http-request deny if suspicious_url

    default_backend sparrowx_panel

# ── Backends ───────────────────────────────────────────────────

backend sparrowx_panel
    balance roundrobin
    option httpchk GET /api/health
    server panel_local 127.0.0.1:PANEL_PORT_PLACEHOLDER check inter 2000 fall 3 rise 2
